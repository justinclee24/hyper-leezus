services:
  - type: web
    name: prediction-api
    runtime: docker
    dockerfilePath: ./infra/docker/python-service.Dockerfile
    dockerContext: .
    buildArgs:
      - SERVICE=prediction-api
      - PORT=8000
    startCommand: uvicorn services.prediction_api.app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: POSTGRES_DSN
        fromDatabase:
          name: hyper-leezus-db
          property: connectionString
      - key: MODEL_STAGE
        value: Production
      - key: APP_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        value: ""
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: ""
      - key: S3_ENDPOINT_URL
        value: ""
      - key: MLFLOW_TRACKING_URI
        value: ""
    healthCheckPath: /health
    plan: free

  - type: web
    name: frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
    plan: free

databases:
  - name: hyper-leezus-db
    databaseName: hyper_leezus
    user: hyper_leezus
    plan: free
