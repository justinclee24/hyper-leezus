services:
  - type: web
    name: prediction-api
    runtime: image
    image:
      url: ghcr.io/justin306/hyper-leezus/prediction-api:latest
    envVars:
      - key: POSTGRES_DSN
        fromDatabase:
          name: hyper-leezus-db
          property: connectionString
      - key: MODEL_STAGE
        value: Production
      - key: APP_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        value: ""
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: ""
      - key: S3_ENDPOINT_URL
        value: ""
      - key: MLFLOW_TRACKING_URI
        value: ""
    healthCheckPath: /health
    plan: free

  - type: web
    name: data-ingestion
    runtime: image
    image:
      url: ghcr.io/justin306/hyper-leezus/data-ingestion:latest
    envVars:
      - key: POSTGRES_DSN
        fromDatabase:
          name: hyper-leezus-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: ""
      - key: S3_ENDPOINT_URL
        value: ""
      - key: S3_BUCKET
        value: hyper-leezus-raw
      - key: ODDS_API_KEY
        sync: false
      - key: SPORTRADAR_API_KEY
        value: ""
      - key: REDDIT_ACCESS_TOKEN
        value: ""
      - key: WEATHER_API_KEY
        value: ""
    healthCheckPath: /health
    plan: free

  - type: web
    name: training-service
    runtime: image
    image:
      url: ghcr.io/justin306/hyper-leezus/training-service:latest
    envVars:
      - key: POSTGRES_DSN
        fromDatabase:
          name: hyper-leezus-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: MLFLOW_TRACKING_URI
        value: ""
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: ""
      - key: S3_ENDPOINT_URL
        value: ""
    healthCheckPath: /health
    plan: free

  - type: web
    name: frontend
    runtime: image
    image:
      url: ghcr.io/justin306/hyper-leezus/frontend:latest
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: POSTGRES_DSN
        fromDatabase:
          name: hyper-leezus-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: PREDICTION_API_URL
        sync: false
      - key: PREDICTION_API_TOKEN
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_ETH_PAYMENT_ADDRESS
        sync: false
      - key: NEXT_PUBLIC_URL
        sync: false
      - key: SPORTRADAR_API_KEY
        sync: false
      - key: SPORTRADAR_ACCESS_LEVEL
        value: trial
      - key: SPORTRADAR_LANGUAGE_CODE
        value: en
      - key: NFL_SEASON_YEAR
        value: "2025"
      - key: NFL_SEASON_TYPE
        value: REG
      - key: NFL_WEEK
        value: "1"
      - key: NEXT_PUBLIC_SPORTRADAR_LEAGUES
        value: "nfl"
      - key: ADMIN_EMAILS
        sync: false
    plan: free

  - type: cron
    name: ingest-cron
    runtime: image
    image:
      url: ghcr.io/justin306/hyper-leezus/data-ingestion:latest
    schedule: "0 8 * * *"
    envVars:
      - key: POSTGRES_DSN
        fromDatabase:
          name: hyper-leezus-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: ""
      - key: S3_ENDPOINT_URL
        value: ""
      - key: S3_BUCKET
        value: hyper-leezus-raw
      - key: ODDS_API_KEY
        sync: false
      - key: SPORTRADAR_API_KEY
        value: ""
      - key: REDDIT_ACCESS_TOKEN
        value: ""
      - key: WEATHER_API_KEY
        value: ""

  - type: cron
    name: train-cron
    runtime: image
    image:
      url: ghcr.io/justin306/hyper-leezus/training-service:latest
    schedule: "0 4 * * *"
    envVars:
      - key: POSTGRES_DSN
        fromDatabase:
          name: hyper-leezus-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: MLFLOW_TRACKING_URI
        value: ""
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: ""
      - key: S3_ENDPOINT_URL
        value: ""

databases:
  - name: hyper-leezus-db
    databaseName: hyper_leezus
    user: hyper_leezus
    plan: free
