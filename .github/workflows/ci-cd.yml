name: ci-cd

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - run: python -m compileall services ml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build

  docker:
    if: github.ref == 'refs/heads/main'
    needs: [backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: prediction-api
            port: 8000
          - service: data-ingestion
            port: 8001
          - service: feature-pipeline
            port: 8002
          - service: training-service
            port: 8003
          - service: realtime-streaming
            port: 8005
          - service: monitoring-service
            port: 8006
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/python-service.Dockerfile
          build-args: |
            SERVICE=${{ matrix.service }}
            PORT=${{ matrix.port }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hyper-leezus/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/hyper-leezus/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-frontend:
    if: github.ref == 'refs/heads/main'
    needs: [frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hyper-leezus/frontend:latest
            ghcr.io/${{ github.repository_owner }}/hyper-leezus/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [docker, docker-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render redeploy — frontend
        if: secrets.RENDER_DEPLOY_HOOK_FRONTEND != ''
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"

      - name: Trigger Render redeploy — prediction-api
        if: secrets.RENDER_DEPLOY_HOOK_PREDICTION_API != ''
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PREDICTION_API }}"

      - name: Trigger Render redeploy — data-ingestion
        if: secrets.RENDER_DEPLOY_HOOK_DATA_INGESTION != ''
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DATA_INGESTION }}"

      - name: Trigger Render redeploy — training-service
        if: secrets.RENDER_DEPLOY_HOOK_TRAINING_SERVICE != ''
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_TRAINING_SERVICE }}"
