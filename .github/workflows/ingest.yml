name: Data Ingestion

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: infra/requirements/data-ingestion.txt

      - name: Install dependencies
        run: pip install -r infra/requirements/data-ingestion.txt

      - name: Run ingestion
        env:
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          APP_ENV: production
          PYTHONPATH: .
          S3_ENDPOINT_URL: ""
          KAFKA_BOOTSTRAP_SERVERS: ""
          REDIS_URL: ""
        run: python -m services.data_ingestion.run_once
