name: ESPN Historical Backfill

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Days of history to fetch (default 180 = full season)"
        required: false
        default: "180"
      sport:
        description: "Single sport: nba | nhl | mlb | nfl | ncaab — leave blank for all"
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: infra/requirements/gha-training.txt

      - name: Install dependencies
        run: pip install -r infra/requirements/gha-training.txt

      - name: Run ESPN backfill
        env:
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
          APP_ENV: production
          PYTHONPATH: .
          S3_ENDPOINT_URL: ""
          KAFKA_BOOTSTRAP_SERVERS: ""
          REDIS_URL: ""
          MLFLOW_TRACKING_URI: ""
        run: |
          SPORT="${{ github.event.inputs.sport }}"
          DAYS="${{ github.event.inputs.days_back }}"
          if [ -n "$SPORT" ]; then
            python -m services.data_ingestion.run_backfill --days-back "$DAYS" --sport "$SPORT"
          else
            python -m services.data_ingestion.run_backfill --days-back "$DAYS"
          fi
