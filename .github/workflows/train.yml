name: Model Training

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: infra/requirements/gha-training.txt

      - name: Install dependencies
        run: pip install -r infra/requirements/gha-training.txt

      - name: Run training
        env:
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
          APP_ENV: production
          PYTHONPATH: .
          S3_ENDPOINT_URL: ""
          KAFKA_BOOTSTRAP_SERVERS: ""
          MLFLOW_TRACKING_URI: ""
        run: python -m services.training_service.run_once
