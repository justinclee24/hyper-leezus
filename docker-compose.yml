version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hyper_leezus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.0
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"

  data-ingestion:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE: data-ingestion
    command: uvicorn services.data_ingestion.app.main:app --host 0.0.0.0 --port 8001
    env_file: .env
    ports:
      - "8001:8001"
    depends_on: [postgres, redis, kafka, minio]

  feature-pipeline:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE: feature-pipeline
    command: uvicorn services.feature_pipeline.app.main:app --host 0.0.0.0 --port 8002
    env_file: .env
    ports:
      - "8002:8002"
    depends_on: [postgres, redis, kafka, minio]

  training-service:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE: training-service
    command: uvicorn services.training_service.app.main:app --host 0.0.0.0 --port 8003
    env_file: .env
    ports:
      - "8003:8003"
    depends_on: [postgres, redis, mlflow, minio]

  prediction-api:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE: prediction-api
    command: uvicorn services.prediction_api.app.main:app --host 0.0.0.0 --port 8004
    env_file: .env
    ports:
      - "8004:8004"
    depends_on: [postgres, redis, kafka, mlflow]

  realtime-streaming:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE: realtime-streaming
    command: uvicorn services.realtime_streaming.app.main:app --host 0.0.0.0 --port 8005
    env_file: .env
    ports:
      - "8005:8005"
    depends_on: [redis, kafka]

  monitoring-service:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE: monitoring-service
    command: uvicorn services.monitoring_service.app.main:app --host 0.0.0.0 --port 8006
    env_file: .env
    ports:
      - "8006:8006"
    depends_on: [postgres, redis, mlflow]

volumes:
  postgres_data:
